name: Keep Streamlit Alive

on:
  schedule:
    - cron: "0 */11 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wake:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Wake Streamlit app in browser
        run: |
          python - <<'PY'
          from playwright.sync_api import sync_playwright

          DIRECT_URL = "https://fruition-componentmatche.streamlit.app/"
          PUBLIC_URL = "https://fruition-component.pages.dev/?keepalive=1"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page(viewport={"width": 1440, "height": 960})

              page.goto(DIRECT_URL, wait_until="domcontentloaded", timeout=120000)
              page.wait_for_timeout(5000)

              body_text = page.locator("body").inner_text(timeout=10000).lower()
              if "yes, get this app back up!" in body_text:
                  page.get_by_role("button", name="Yes, get this app back up!").click(timeout=10000)
                  page.wait_for_timeout(20000)

              # Touch the public entry afterwards so the visible site stays warm too.
              page.goto(PUBLIC_URL, wait_until="domcontentloaded", timeout=120000)
              page.wait_for_timeout(10000)

              browser.close()
          PY
