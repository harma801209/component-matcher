name: Keep Streamlit Alive

on:
  schedule:
    - cron: "0 */11 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Streamlit app
        shell: bash
        run: |
          set -euo pipefail

          cookie_jar="$(mktemp)"
          trap 'rm -f "${cookie_jar}"' EXIT

          curl --fail --silent --show-error --location \
            --cookie "${cookie_jar}" \
            --cookie-jar "${cookie_jar}" \
            --retry 3 --retry-all-errors --max-time 120 --max-redirs 20 \
            -H "Cache-Control: no-store" \
            -H "Pragma: no-cache" \
            "https://fruition-componentmatche.streamlit.app/_stcore/health" >/dev/null
